<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塾用・4択英単語テスト</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 20px; color: #333; margin-top: 0; }
        .japanese { font-size: 28px; font-weight: bold; color: #333; margin: 20px 0; }
        .progress { color: #666; font-size: 14px; margin-bottom: 15px; }
        .btn {
            background-color: white;
            color: #333;
            border: 2px solid #e0e0e0;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #f7f9fa; }
        .choice-btn { font-size: 18px; letter-spacing: 0.5px; }
        .action-btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .result-message { font-size: 18px; font-weight: bold; margin: 15px 0; }
        .correct { color: #2ecc71; border-color: #2ecc71 !important; background-color: #eafeec; }
        .incorrect { color: #e74c3c; border-color: #e74c3c !important; background-color: #fdedec; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="category-screen">
        <h1>テストするカテゴリを選んでね</h1>
        <div id="category-list"></div>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="progress" id="progress">第 1 問 / 全 10 問</div>
        <div class="japanese" id="japanese-word">日本語</div>
        <div id="choices-list"></div>
        <div class="result-message" id="result-message"></div>
        <button onclick="nextQuestion()" id="next-btn" class="action-btn" style="display: none;">次へ進む</button>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>テスト終了！</h2>
        <p id="final-score" style="font-size: 18px; font-weight: bold;"></p>
        <button onclick="showCategoryScreen()" class="action-btn">別のテストを選ぶ</button>
    </div>
</div>

<script>
// 【1】ご指定いただいた単語をすべて追加しました
const wordData = {
    "数字 (1〜10)": [
        { english: "one", japanese: "1" }, { english: "two", japanese: "2" }, { english: "three", japanese: "3" },
        { english: "four", japanese: "4" }, { english: "five", japanese: "5" }, { english: "six", japanese: "6" },
        { english: "seven", japanese: "7" }, { english: "eight", japanese: "8" }, { english: "nine", japanese: "9" },
        { english: "ten", japanese: "10" }
    ],
    "数字 (大きな数・序数)": [
        { english: "eleven", japanese: "11" }, { english: "twelve", japanese: "12" }, { english: "thirteen", japanese: "13" },
        { english: "twenty", japanese: "20" }, { english: "thirty", japanese: "30" }, { english: "forty", japanese: "40" },
        { english: "fifty", japanese: "50" }, { english: "hundred", japanese: "100" }, { english: "thousand", japanese: "1000" },
        { english: "first", japanese: "1番目の" }, { english: "second", japanese: "2番目の" }, { english: "third", japanese: "3番目の" },
        { english: "tenth", japanese: "10番目の" }
    ],
    "曜日": [
        { english: "Monday", japanese: "月曜日" }, { english: "Tuesday", japanese: "火曜日" },
        { english: "Wednesday", japanese: "水曜日" }, { english: "Thursday", japanese: "木曜日" },
        { english: "Friday", japanese: "金曜日" }, { english: "Saturday", japanese: "土曜日" },
        { english: "Sunday", japanese: "日曜日" }
    ],
    "1月〜12月": [
        { english: "January", japanese: "1月" }, { english: "February", japanese: "2月" },
        { english: "March", japanese: "3月" }, { english: "April", japanese: "4月" },
        { english: "May", japanese: "5月" }, { english: "June", japanese: "6月" },
        { english: "July", japanese: "7月" }, { english: "August", japanese: "8月" },
        { english: "September", japanese: "9月" }, { english: "October", japanese: "10月" },
        { english: "November", japanese: "11月" }, { english: "December", japanese: "12月" }
    ],
    "時間・季節": [
        { english: "season", japanese: "季節" }, { english: "morning", japanese: "朝" },
        { english: "afternoon", japanese: "昼" }, { english: "night", japanese: "夜" }
    ],
    "食事・食べ物": [
        { english: "breakfast", japanese: "朝食" }, { english: "lunch", japanese: "昼食" },
        { english: "dinner", japanese: "夕食" }, { english: "water", japanese: "水" }
    ],
    "学校・勉強・趣味": [
        { english: "book", japanese: "本" }, { english: "notebook", japanese: "ノートブック" },
        { english: "school", japanese: "学校" }, { english: "music", japanese: "音楽" },
        { english: "science", japanese: "理科" }, { english: "trip", japanese: "旅" },
        { english: "festival", japanese: "祭り" }
    ],
    "スポーツ": [
        { english: "tennis", japanese: "テニス" }, { english: "baseball", japanese: "野球" },
        { english: "basketball", japanese: "バスケットボール" }
    ],
    "乗り物": [
        { english: "bus", japanese: "バス" }, { english: "car", japanese: "車" },
        { english: "ship", japanese: "船" }
    ],
    "家・家具・自然・動物": [
        { english: "bird", japanese: "鳥" }, { english: "bed", japanese: "ベッド" },
        { english: "chair", japanese: "椅子" }, { english: "desk", japanese: "机" },
        { english: "table", japanese: "テーブル" }, { english: "mountain", japanese: "山" },
        { english: "river", japanese: "川" }, { english: "sea", japanese: "海" },
        { english: "tree", japanese: "木" }, { english: "lake", japanese: "湖" }
    ],
    "街の施設": [
        { english: "hospital", japanese: "病院" }, { english: "station", japanese: "駅" },
        { english: "park", japanese: "公園" }, { english: "library", japanese: "図書館" },
        { english: "post office", japanese: "郵便局" }, { english: "bank", japanese: "銀行" },
        { english: "zoo", japanese: "動物園" }, { english: "museum", japanese: "博物館" },
        { english: "gym", japanese: "体育館" }, { english: "temple", japanese: "寺" }
    ],
    "家族・体": [
        { english: "family", japanese: "家族" }, { english: "body", japanese: "体の名前（体）" }
    ],
    "職業（仕事）": [
        { english: "doctor", japanese: "医者" }, { english: "nurse", japanese: "看護師" },
        { english: "dentist", japanese: "歯医者" }, { english: "pilot", japanese: "パイロット" },
        { english: "singer", japanese: "歌手" }, { english: "teacher", japanese: "先生" },
        { english: "musician", japanese: "音楽家" }, { english: "artist", japanese: "芸術家" }
    ]
};

let currentCategory = ""; let currentWords = []; let currentIndex = 0; let score = 0; let isAnswered = false;
function showCategoryScreen() {
    document.getElementById("category-screen").style.display = "block"; document.getElementById("quiz-screen").style.display = "none"; document.getElementById("result-screen").style.display = "none";
    const catListDiv = document.getElementById("category-list"); catListDiv.innerHTML = "";
    Object.keys(wordData).forEach(category => {
        const btn = document.createElement("button"); btn.className = "btn"; btn.innerText = category; btn.onclick = () => startQuiz(category); catListDiv.appendChild(btn);
    });
}
function startQuiz(category) {
    currentCategory = category; currentWords = [...wordData[category]].sort(() => Math.random() - 0.5);
    if (currentWords.length > 10) { currentWords = currentWords.slice(0, 10); }
    currentIndex = 0; score = 0; document.getElementById("category-screen").style.display = "none"; document.getElementById("quiz-screen").style.display = "block"; showQuestion();
}
function showQuestion() {
    isAnswered = false; document.getElementById("next-btn").style.display = "none"; document.getElementById("result-message").innerText = "";
    const currentQuestion = currentWords[currentIndex]; document.getElementById("progress").innerText = `第 ${currentIndex + 1} 問 / 全 ${currentWords.length} 問`; document.getElementById("japanese-word").innerText = currentQuestion.japanese;
    const choices = makeChoices(currentQuestion.english, wordData[currentCategory]); const choicesListDiv = document.getElementById("choices-list"); choicesListDiv.innerHTML = "";
    choices.forEach(choice => {
        const btn = document.createElement("button"); btn.className = "btn choice-btn"; btn.innerText = choice; btn.onclick = () => checkAnswer(btn, choice, currentQuestion.english); choicesListDiv.appendChild(btn);
    });
}
function makeChoices(correctAnswer, allCategoryWords) {
    const allEnglish = allCategoryWords.map(w => w.english); let dummies = allEnglish.filter(eng => eng !== correctAnswer); dummies.sort(() => Math.random() - 0.5); let chosenDummies = dummies.slice(0, 3);
    while (chosenDummies.length < 3) { chosenDummies.push("apple", "book", "desk", "test"); } // 選択肢が足りない場合のダミー補填
    let finalChoices = [correctAnswer, ...chosenDummies.slice(0, 3)]; finalChoices.sort(() => Math.random() - 0.5); return finalChoices;
}
function checkAnswer(clickedBtn, selected, correct) {
    if (isAnswered) return; isAnswered = true; const choiceButtons = document.querySelectorAll(".choice-btn"); const resultMsg = document.getElementById("result-message");
    if (selected === correct) { clickedBtn.classList.add("correct"); resultMsg.innerText = "⭕ 正解！"; resultMsg.style.color = "#2ecc71"; score++; } 
    else { clickedBtn.classList.add("incorrect"); resultMsg.innerText = `❌ 不正解！ 正解は: ${correct}`; resultMsg.style.color = "#e74c3c"; choiceButtons.forEach(btn => { if (btn.innerText === correct) { btn.classList.add("correct"); } }); }
    document.getElementById("next-btn").style.display = "block";
}
function nextQuestion() { currentIndex++; if (currentIndex < currentWords.length) { showQuestion(); } else { showResult(); } }
function showResult() { document.getElementById("quiz-screen").style.display = "none"; document.getElementById("result-screen").style.display = "block"; document.getElementById("final-score").innerText = `${currentWords.length} 問中 ${score} 問 正解！`; }
showCategoryScreen();
</script>
</body>
</html>
