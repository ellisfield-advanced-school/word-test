<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エリスフィールド進学会 英単語テスト</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #quiz-container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 30px;
            width: 90%;
            max-width: 440px;
            text-align: center;
        }
        h1 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        #progress {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        #word {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
            background-color: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .choice-btn:hover {
            background-color: #f7f9fa;
            border-color: #b0bec5;
        }
        .choice-btn.correct {
            background-color: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
        }
        .choice-btn.incorrect {
            background-color: #ffebee;
            border-color: #f44336;
            color: #c62828;
        }
        #result-message {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            min-height: 27px;
        }
        #next-btn {
            display: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #2196f3;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #next-btn:hover {
            background-color: #1e88e5;
        }
        #category-screen {
            display: block;
        }
        #quiz-screen, #result-screen {
            display: none;
        }
        .category-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #4caf50;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .category-btn:hover {
            background-color: #43a047;
        }
        #restart-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #ff9800;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="category-screen">
        <h1>エリスフィールド進学会<br>英単語テスト</h1>
        <p>学習するステージを選んでください</p>
        <div id="category-list"></div>
    </div>

    <div id="quiz-screen">
        <div id="progress"></div>
        <div id="word"></div>
        <div id="choices-list"></div>
        <div id="result-message"></div>
        <button id="next-btn" onclick="nextQuestion()">次へ進む ➔</button>
    </div>

    <div id="result-screen">
        <h2>テスト終了！</h2>
        <div id="score-message" style="font-size: 20px; margin: 20px 0;"></div>
        <button id="restart-btn" onclick="showCategoryScreen()">ステージ選択に戻る</button>
    </div>
</div>

<script>
    const wordData = {
        "ステージ 1": [
            { english: "apple", japanese: "りんご" },
            { english: "book", japanese: "本" },
            { english: "cat", japanese: "猫" },
            { english: "dog", japanese: "犬" },
            { english: "egg", japanese: "卵" },
            { english: "fish", japanese: "魚" },
            { english: "girl", japanese: "女の子" },
            { english: "home", japanese: "家" },
            { english: "ice", japanese: "氷" },
            { english: "juice", japanese: "ジュース" }
        ],
        "ステージ 2": [
            { english: "king", japanese: "王様" },
            { english: "lion", japanese: "ライオン" },
            { english: "milk", japanese: "牛乳" },
            { english: "nest", japanese: "巣" },
            { english: "orange", japanese: "オレンジ" },
            { english: "pen", japanese: "ペン" },
            { english: "queen", japanese: "女王" },
            { english: "rain", japanese: "雨" },
            { english: "star", japanese: "星" },
            { english: "tree", japanese: "木" }
        ]
    };

    let currentCategory = "";
    let currentWords = [];
    let currentIndex = 0;
    let score = 0;
    let isAnswered = false;

    const categoryList = document.getElementById("category-list");
    const quizScreen = document.getElementById("quiz-screen");
    const categoryScreen = document.getElementById("category-screen");
    const resultScreen = document.getElementById("result-screen");
    const progressText = document.getElementById("progress");
    const wordText = document.getElementById("word");
    const choicesList = document.getElementById("choices-list");
    const resultMsg = document.getElementById("result-message");

    function init() {
        categoryList.innerHTML = "";
        for (let category in wordData) {
            const btn = document.createElement("button");
            btn.className = "category-btn";
            btn.innerText = category;
            btn.onclick = () => startQuiz(category);
            categoryList.appendChild(btn);
        }
    }

    function showCategoryScreen() {
        resultScreen.style.display = "none";
        quizScreen.style.display = "none";
        categoryScreen.style.display = "block";
        init();
    }

    function startQuiz(category) {
        currentCategory = category;
        currentWords = [...wordData[category]].sort(() => Math.random() - 0.5);
        currentIndex = 0;
        score = 0;
        categoryScreen.style.display = "none";
        quizScreen.style.display = "block";
        showQuestion();
    }

    function showQuestion() {
        isAnswered = false;
        resultMsg.innerText = "";
        document.getElementById("next-btn").style.display = "none";
        
        const q = currentWords[currentIndex];
        progressText.innerText = `第 ${currentIndex + 1} 問 / 全 ${currentWords.length} 問`;
        wordText.innerText = q.japanese;
        
        const choices = generateChoices(q.english, currentCategory);
        choicesList.innerHTML = "";
        
        choices.forEach(choice => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(btn, choice, q.english);
            choicesList.appendChild(btn);
        });
    }

    function generateChoices(correctAnswer, category) {
        const allWords = wordData[category].map(w => w.english);
        const dummies = allWords.filter(w => w !== correctAnswer);
        const chosenDummies = dummies.sort(() => Math.random() - 0.5).slice(0, 3);
        const finalChoices = [correctAnswer, ...chosenDummies];
        return finalChoices.sort(() => Math.random() - 0.5);
    }

    function checkAnswer(clickedBtn, selected, correct) {
        if (isAnswered) return;
        isAnswered = true;
        const choiceButtons = document.querySelectorAll(".choice-btn");
        
        if (selected === correct) {
            clickedBtn.classList.add("correct");
            resultMsg.innerText = "⭕ 正解！";
            resultMsg.style.color = "green";
            score++;
        } else {
            clickedBtn.classList.add("incorrect");
            resultMsg.innerText = `❌ 不正解！ 正解は: ${correct}`;
            resultMsg.style.color = "red";
            choiceButtons.forEach(btn => {
                if (btn.innerText === correct) {
                    btn.classList.add("correct");
                }
            });
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentWords.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        quizScreen.style.display = "none";
        resultScreen.style.display = "block";
        document.getElementById("score-message").innerText = `あなたのスコア: ${score} / ${currentWords.length}`;
    }

    init();
</script>

</body>
</html>
