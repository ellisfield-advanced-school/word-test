<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-sizing: border-box;
        }
        h1, h2 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .category-button, .option-button, .nav-button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .category-button:hover, .option-button:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }
        .option-button.correct {
            background-color: #ecfdf5;
            border-color: #10b981;
            color: #047857;
        }
        .option-button.incorrect {
            background-color: #fef2f2;
            border-color: #ef4444;
            color: #b91c1c;
        }
        .nav-button {
            background-color: #3b82f6;
            color: white;
            border: none;
            margin-top: 20px;
        }
        .nav-button:hover {
            background-color: #2563eb;
        }
        .result-message {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .result-message.correct { color: #10b981; }
        .result-message.incorrect { color: #ef4444; }
        .circle-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 4px solid #10b981;
            border-radius: 50%;
        }
        .cross-icon {
            display: inline-block;
            position: relative;
            width: 24px;
            height: 24px;
        }
        .cross-icon::before, .cross-icon::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 0;
            width: 24px;
            height: 4px;
            background-color: #ef4444;
        }
        .cross-icon::before { transform: rotate(45deg); }
        .cross-icon::after { transform: rotate(-45deg); }
        .score {
            font-size: 28px;
            font-weight: bold;
            color: #3b82f6;
            margin: 20px 0;
        }
        .progress {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 10px;
        }
        #word-display {
            font-size: 32px;
            font-weight: bold;
            color: #1e293b;
            margin: 25px 0;
        }
    </style>
</head>

    <div id="screen-result" style="display: none;">

        <button class="nav-button" onclick="showCategoryScreen()">カテゴリ選択に戻る</button>

// --- クイズシステム制御変数 ---
let currentCategory = "";
let quizQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let hasAnswered = false;

// --- カテゴリ選択画面の生成 ---
function showCategoryScreen() {
    document.getElementById("screen-category").style.display = "block";
    document.getElementById("screen-quiz").style.display = "none";
    document.getElementById("screen-result").style.display = "none";

    const container = document.getElementById("category-container");
    container.innerHTML = "";

    // ご指定のカテゴリ表示順
    const categoryOrder = [
        "学校の活動・行事", "スポーツ", "楽器・音楽", "乗り物", "家・家具", 
        "自然", "街の施設（お出かけ）", "街の施設（駅・公共など）", "職業（仕事）", 
        "動物", "身の回りのもの", "体", "料理", "食べ物・飲み物", "国・地域",
        "不規則動詞 (過去形)", "不規則動詞 (過去分詞)"
    ];

    categoryOrder.forEach(category => {
        if (wordData[category]) {
            const button = document.createElement("button");
            button.className = "category-button";
            button.innerText = category;
            button.onclick = () => startQuiz(category);
            container.appendChild(button);
        }
    });
}

// --- クイズの開始処理 ---
function startQuiz(category) {
    currentCategory = category;
    const allWords = wordData[category];
    
    // 単語リストをランダムに並び替え、最大10問を抽出
    const shuffled = [...allWords].sort(() => 0.5 - Math.random());
    quizQuestions = shuffled.slice(0, Math.min(10, shuffled.length));
    
    currentQuestionIndex = 0;
    score = 0;

    document.getElementById("screen-category").style.display = "none";
    document.getElementById("screen-quiz").style.display = "block";
    
    showQuestion();
}

// --- 問題の表示 ---
function showQuestion() {
    hasAnswered = false;
    document.getElementById("feedback-container").innerHTML = "";
    
    const currentQuestion = quizQuestions[currentQuestionIndex];
    document.getElementById("quiz-progress").innerText = `第 ${currentQuestionIndex + 1} 問 / 全 ${quizQuestions.length} 問`;
    
    // 出題形式：英語を表示して日本語を選ばせる
    document.getElementById("word-display").innerText = currentQuestion.english;

    // 選択肢の生成（正解1個 + 同じカテゴリ内から誤答3個）
    const options = [currentQuestion.japanese];
    const otherWords = wordData[currentCategory].filter(w => w.japanese !== currentQuestion.japanese);
    const shuffledOthers = otherWords.sort(() => 0.5 - Math.random());
    
    for (let i = 0; i < Math.min(3, shuffledOthers.length); i++) {
        options.push(shuffledOthers[i].japanese);
    }
    
    // 選択肢をシャッフル
    const shuffledOptions = options.sort(() => 0.5 - Math.random());
    
    const optionsContainer = document.getElementById("options-container");
    optionsContainer.innerHTML = "";
    
    shuffledOptions.forEach(opt => {
        const button = document.createElement("button");
        button.className = "option-button";
        button.innerText = opt;
        button.onclick = () => checkAnswer(button, opt, currentQuestion.japanese);
        optionsContainer.appendChild(button);
    });
}

// --- 答え合わせ処理 ---
function checkAnswer(selectedButton, selectedOpt, correctOpt) {
    if (hasAnswered) return;
    hasAnswered = true;

    const buttons = document.getElementsByClassName("option-button");
    const feedbackContainer = document.getElementById("feedback-container");

    if (selectedOpt === correctOpt) {
        score++;
        selectedButton.classList.add("correct");
        feedbackContainer.innerHTML = `<div class="result-message correct"><span class="circle-icon"></span> 正解！</div>`;
    } else {
        selectedButton.classList.add("incorrect");
        // 正解のボタンをハイライト
        for (let btn of buttons) {
            if (btn.innerText === correctOpt) {
                btn.classList.add("correct");
            }
        }
        feedbackContainer.innerHTML = `<div class="result-message incorrect"><span class="cross-icon"></span> 不正解...</div>`;
    }

    // 「次へ進む」ボタンの設置
    const nextButton = document.createElement("button");
    nextButton.className = "nav-button";
    if (currentQuestionIndex < quizQuestions.length - 1) {
        nextButton.innerText = "次へ進む";
        nextButton.onclick = () => {
            currentQuestionIndex++;
            showQuestion();
        };
    } else {
        nextButton.innerText = "結果を見る";
        nextButton.onclick = showResultScreen;
    }
    feedbackContainer.appendChild(nextButton);
}

// --- 結果画面の表示 ---
function showResultScreen() {
    document.getElementById("screen-quiz").style.display = "none";
    document.getElementById("screen-result").style.display = "block";
    document.getElementById("final-score").innerText = `${quizQuestions.length} 問中 ${score} 問正解！`;
}

// 初期起動
showCategoryScreen();
